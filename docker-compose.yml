services:
  postgres:
    # RFC-0010: pgvector-enabled Postgres 16 (ships the `vector` extension the
    # 0005 migration enables). Drop-in for postgres:16-alpine (same PGDATA/env).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archetypeos}
      POSTGRES_USER: ${POSTGRES_USER:-archetypeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archetypeos}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archetypeos} -d ${POSTGRES_DB:-archetypeos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      # RFC-0010 / AOS-EMBED-002: fastembed is installed in the image unconditionally,
      # but the ~90 MB model is NOT pre-downloaded by default (compose-smoke stays
      # fast). For a real offline node, build with:
      #   args:
      #     PREDOWNLOAD_EMBEDDING_MODEL: "true"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://archetypeos:archetypeos@postgres:5432/archetypeos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      REPOSITORY_ROOT: ${REPOSITORY_ROOT:-/repositories}
      KNOWLEDGE_ROOT: ${KNOWLEDGE_ROOT:-/knowledge}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      # Embedding tier. Default "deterministic" (lexical fallback, no model, no
      # onnxruntime). Set EMBEDDING_PROVIDER=fastembed (on api AND worker) to
      # activate the real fastembed/ONNX embedder — pair with the pre-download
      # build arg above for a fully offline node.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
      # AOS-VOICE-004: server-side TTS for spoken replies (Groq Orpheus). Reuses
      # the free Groq key; empty → POST /voice/speak returns 204 and the browser
      # falls back to speechSynthesis. Never hard-code the secret value here.
      TTS_API_KEY: ${GROQ_API_KEY:-}
      # AOS-CONNECTOR-RUNTIME-001 (P0-4): forward the free-LLM-pool keys to the API
      # too (not just the worker), so the connector registry that runs here agrees
      # with the pool the worker actually builds from these same vars.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - archetype_data:/data
      - ${HOST_REPOSITORY_ROOT:-./repositories}:/repositories:ro
      - ${HOST_KNOWLEDGE_ROOT:-./knowledge}:/knowledge:ro
    ports:
      - "${API_PORT:-8000}:8000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      # See the api service: build with PREDOWNLOAD_EMBEDDING_MODEL=true for an
      # offline node running the real fastembed tier.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://archetypeos:archetypeos@postgres:5432/archetypeos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      REPOSITORY_ROOT: ${REPOSITORY_ROOT:-/repositories}
      # Set EMBEDDING_PROVIDER=fastembed (matching the api service) to activate the
      # real embedder for distillation-time vectors. Default stays deterministic.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
      # Multi-model Council (AOS-LLM-EVAL-001): forward the enable flag and the
      # free-tier pool keys so council_provider can build the rotating pool. All
      # default empty/false, so the deterministic CI path is unchanged when unset.
      # Values come from the host .env — never hard-code secret values here.
      COUNCIL_MULTI_MODEL: ${COUNCIL_MULTI_MODEL:-false}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      # Research Engine web tier (RFC-0012 / AOS-RESEARCH-002). All default
      # empty/false → build_web_source() returns None → the engine stays on the
      # hermetic LocalCorpusSource, so the CI/no-network path is unchanged when
      # unset. Set RESEARCH_WEB_ENABLED=true + the hosts/key (and start the
      # `research` compose profile below) to activate the web tier. Values come
      # from the host .env — never hard-code the EXA_API_KEY secret value here.
      RESEARCH_WEB_ENABLED: ${RESEARCH_WEB_ENABLED:-false}
      EXA_API_KEY: ${EXA_API_KEY:-}
      CRAWL4AI_URL: ${CRAWL4AI_URL:-}
      SEARXNG_URL: ${SEARXNG_URL:-}
      FIRECRAWL_URL: ${FIRECRAWL_URL:-}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - archetype_data:/data
      - ${HOST_REPOSITORY_ROOT:-./repositories}:/repositories:ro

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://archetypeos:archetypeos@postgres:5432/archetypeos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      REPOSITORY_ROOT: ${REPOSITORY_ROOT:-/repositories}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - archetype_data:/data
      - ${HOST_REPOSITORY_ROOT:-./repositories}:/repositories:ro

  web:
    # AOS-WEB-DEPLOY-001 (P1-5): a multi-stage image builds the SPA and serves the
    # static assets behind Caddy (single-origin /api reverse proxy), replacing the
    # Vite dev server. VITE_* are baked at BUILD time, so they are build args; the
    # baked base is relative (/api) so a tailnet viewer hits their own origin.
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SOTTO_WS_URL: ${VITE_SOTTO_WS_URL:-}
        VITE_SOTTO_TOKEN: ${VITE_SOTTO_TOKEN:-}
    environment:
      # Where Caddy proxies /api/*. Defaults to the compose api service.
      API_UPSTREAM: ${API_UPSTREAM:-api:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Host WEB_PORT (default 5173, unchanged) maps to Caddy's port 80.
    ports:
      - "${WEB_PORT:-5173}:80"

  # --- Research Engine web tier (RFC-0012 / AOS-RESEARCH-002) -----------------
  # crawl4ai (fetch: URL → LLM-ready markdown) and SearXNG (discovery: quota-free
  # meta-search) are the self-hosted workhorses that carry the fetch/discovery
  # volume so the metered Exa API is reserved for high-value discovery. Both are
  # gated behind the `research` compose profile so they DO NOT start by default
  # (`docker compose up` is unchanged); the operator starts them with
  # `docker compose --profile research up` after setting RESEARCH_WEB_ENABLED +
  # the worker's CRAWL4AI_URL/SEARXNG_URL. No GPU required.
  crawl4ai:
    image: unclecode/crawl4ai:latest
    profiles: ["research"]
    environment:
      # crawl4ai serves its HTTP API (markdown fetch) on 11235.
      CRAWL4AI_PORT: "11235"
    shm_size: "1gb"  # Playwright/Chromium needs shared memory for page rendering.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11235/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"

  searxng:
    image: searxng/searxng:latest
    profiles: ["research"]
    environment:
      # SearXNG needs its public base URL and must expose the JSON output format
      # (the SearxngSource adapter requests ?format=json).
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
    volumes:
      - searxng_data:/etc/searxng
    ports:
      - "${SEARXNG_PORT:-8080}:8080"

volumes:
  postgres_data:
  redis_data:
  archetype_data:
  searxng_data:
