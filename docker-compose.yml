services:
  postgres:
    # RFC-0010: pgvector-enabled Postgres 16 (ships the `vector` extension the
    # 0005 migration enables). Drop-in for postgres:16-alpine (same PGDATA/env).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archetypeos}
      POSTGRES_USER: ${POSTGRES_USER:-archetypeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archetypeos}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archetypeos} -d ${POSTGRES_DB:-archetypeos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      # RFC-0010 / AOS-EMBED-002: fastembed is installed in the image unconditionally,
      # but the ~90 MB model is NOT pre-downloaded by default (compose-smoke stays
      # fast). For a real offline node, build with:
      #   args:
      #     PREDOWNLOAD_EMBEDDING_MODEL: "true"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://archetypeos:archetypeos@postgres:5432/archetypeos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      REPOSITORY_ROOT: ${REPOSITORY_ROOT:-/repositories}
      KNOWLEDGE_ROOT: ${KNOWLEDGE_ROOT:-/knowledge}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      # Embedding tier. Default "deterministic" (lexical fallback, no model, no
      # onnxruntime). Set EMBEDDING_PROVIDER=fastembed (on api AND worker) to
      # activate the real fastembed/ONNX embedder — pair with the pre-download
      # build arg above for a fully offline node.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - archetype_data:/data
      - ${HOST_REPOSITORY_ROOT:-./repositories}:/repositories:ro
      - ${HOST_KNOWLEDGE_ROOT:-./knowledge}:/knowledge:ro
    ports:
      - "${API_PORT:-8000}:8000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      # See the api service: build with PREDOWNLOAD_EMBEDDING_MODEL=true for an
      # offline node running the real fastembed tier.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://archetypeos:archetypeos@postgres:5432/archetypeos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      REPOSITORY_ROOT: ${REPOSITORY_ROOT:-/repositories}
      # Set EMBEDDING_PROVIDER=fastembed (matching the api service) to activate the
      # real embedder for distillation-time vectors. Default stays deterministic.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - archetype_data:/data
      - ${HOST_REPOSITORY_ROOT:-./repositories}:/repositories:ro

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://archetypeos:archetypeos@postgres:5432/archetypeos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/data/artifacts}
      REPOSITORY_ROOT: ${REPOSITORY_ROOT:-/repositories}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - archetype_data:/data
      - ${HOST_REPOSITORY_ROOT:-./repositories}:/repositories:ro

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:5173"

volumes:
  postgres_data:
  redis_data:
  archetype_data:
