# Alembic configuration for the ArchetypeOS API.
#
# The database URL is intentionally left blank here: env.py supplies it from
# app.config.get_settings().database_url so migrations always target the same
# database the application uses (sqlite in dev/test, Postgres in the container).

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = alembic

# Template used to generate migration file names. The %%(rev)s and the leading
# slug keep files ordered and human-readable.
# file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps rendered in migrations (blank = local time).
# timezone =

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# The URL is supplied by env.py from application settings, not from here.
sqlalchemy.url =

[post_write_hooks]
# Post-write hooks are not configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
